name: Stok Takip
version: "1.2.0"
slug: stock_watcher
description: Verilen ürün linkini saat başı kontrol eder ve ürün stoğa girince Pushover bildirimi gönderir.
url: https://github.com/nriacr/stock-watcher/tree/main/stock-watcher
arch:
  - aarch64
  - armv7
  - armhf
startup: services
boot: auto
init: false
options:
  pushover_user_key: ""
  pushover_api_token: ""
  check_interval_minutes: 60
  notify_once: true
  request_timeout_seconds: 20
  user_agent: "Mozilla/5.0 (compatible; HomeAssistantStockWatcher/1.0)"
  products:
    - name: "Ürün 1"
      url: ""
      in_stock_keywords:
        - "sepete ekle"
        - "stokta"
        - "hemen al"
        - "add to cart"
        - "in stock"
      out_of_stock_keywords:
        - "stokta yok"
        - "tükendi"
        - "geçici olarak temin edilemiyor"
        - "out of stock"
        - "sold out"
schema:
  pushover_user_key: password
  pushover_api_token: password
  check_interval_minutes: int(5,1440)
  notify_once: bool
  request_timeout_seconds: int(5,120)
  user_agent: str
  products:
    - name: str
      url: str
      in_stock_keywords:
        - str
      out_of_stock_keywords:
        - str
